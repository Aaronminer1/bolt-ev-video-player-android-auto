name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/bolt-player.apk

      # Upload as workflow artifact (always available, 90-day retention)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bolt-player-apk
          path: app/build/outputs/apk/debug/bolt-player.apk
          retention-days: 90

      # Create/update a rolling "latest" GitHub Release with the APK attached
      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

      - name: Create latest release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          ## One-tap install

          **Open this on your Android phone:**
          https://aaronminer1.github.io/bolt-ev-video-player-android-auto

          Or tap the **bolt-player.apk** asset below to download directly, then tap the download notification to install.
          EOF
          echo "" >> /tmp/release-notes.md
          echo "Built from commit: ${{ github.sha }}" >> /tmp/release-notes.md
          gh release create latest \
            --title "Bolt Player - Latest Build" \
            --notes-file /tmp/release-notes.md \
            --latest \
            app/build/outputs/apk/debug/bolt-player.apk

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Enable GitHub Pages from gh-pages branch via API (no-op if already enabled)
      - name: Enable GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST /repos/${{ github.repository }}/pages \
            -f "source[branch]=gh-pages" -f "source[path]=/" 2>/dev/null || true
          gh api -X PUT /repos/${{ github.repository }}/pages \
            -f "source[branch]=gh-pages" -f "source[path]=/" 2>/dev/null || true

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
