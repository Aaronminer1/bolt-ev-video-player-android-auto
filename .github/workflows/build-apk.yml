name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/bolt-player.apk

      # Upload as workflow artifact (always available, 90-day retention)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bolt-player-apk
          path: app/build/outputs/apk/debug/bolt-player.apk
          retention-days: 90

      # Create/update a rolling "latest" GitHub Release with the APK attached
      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

      - name: Create latest release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Bolt Player – Latest Build" \
            --notes "Automatically built from the latest commit on \`main\`.

## Install on your phone

1. Download **bolt-player.apk** below
2. On your Android phone: **Settings → Apps → Install unknown apps** → allow your browser/Files app
3. Open the downloaded APK and tap **Install**
4. Open Android Auto and grant the overlay permission when prompted

> Built from commit: ${{ github.sha }}" \
            --prerelease \
            app/build/outputs/apk/debug/bolt-player.apk
